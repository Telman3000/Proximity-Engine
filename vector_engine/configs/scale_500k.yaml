# Scale config for the full 500k benchmark (run overnight on CPU)
seed: 42

paths:
  root: "."
  artifacts: "artifacts"
  outputs: "outputs"
  real_scenes_dir: "../bp_repo/backend/data/scenes"

corpus:
  target_size: 500000
  synthetic_fraction: 1.0
  key_multiplicity_min: 2
  key_multiplicity_max: 12

queries:
  n_queries: 1000
  paraphrase_distinct: true

embed:
  backend: "tfidf-svd"
  model: "BAAI/bge-small-en-v1.5"
  batch_size: 512
  normalize: true
  tfidf:
    max_features: 50000
    ngram_max: 2
    dim: 256
  dim_reduction:
    method: "none"
    dim: 128

index:
  type: "flat"
  metric: "ip"
  hnsw:
    M: 32
    ef_construction: 200
    ef_search: 64
  ivfpq:
    nlist: 4096
    m: 32
    nbits: 8
    nprobe: 16
  opq:
    nlist: 4096
    m: 32
    nbits: 8
    nprobe: 16

store:
  backend: "faiss"

search:
  top_k: 10
  cascade:
    enabled: false
    coarse_k: 100
    rerank: "exact"

eval:
  ks: [1, 5, 10]
  bootstrap:
    enabled: true
    n_resamples: 1000
    ci: 0.95

analyze:
  sample: 50000
